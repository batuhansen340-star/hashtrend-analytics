name: HashTrend Pipeline
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r hashtrend-analytics/requirements.txt
      - name: Run pipeline
        working-directory: hashtrend-analytics
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Categorizer + edu_scorer için Ollama Cloud ($0/ay marjinal)
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_DIRECTOR_MODEL: gpt-oss:120b
          OLLAMA_CATEGORIZER_MODEL: gpt-oss:120b
          OLLAMA_EDU_MODEL: gpt-oss:120b
          # Legacy Anthropic fallback (Ollama 429 olursa)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENVIRONMENT: production
        run: python pipeline.py --no-telegram
      # NOT: Mat view refresh PostgREST üzerinden 60s statement_timeout'a
      # takılıyordu (kod 57014). Refresh artık Supabase tarafında pg_cron
      # ile DB-side schedule edilmiş durumda (her 2 saatte bir, *:15 UTC).
      # Workflow refresh adımı kaldırıldı; pipeline yalnızca collector +
      # DB write yapar, refresh background job hallediyor.
