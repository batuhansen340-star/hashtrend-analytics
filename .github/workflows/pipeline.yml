name: HashTrend Pipeline
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r hashtrend-analytics/requirements.txt
      - name: Install Playwright browsers (TikTokApi için)
        # TikTokApi signature generation için chromium gerekir.
        # --with-deps Linux runtime kütüphanelerini de kurar.
        run: playwright install chromium --with-deps
      - name: Run pipeline
        working-directory: hashtrend-analytics
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Categorizer + edu_scorer için Ollama Cloud ($0/ay marjinal)
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_DIRECTOR_MODEL: gpt-oss:120b
          OLLAMA_CATEGORIZER_MODEL: gpt-oss:120b
          OLLAMA_EDU_MODEL: gpt-oss:120b
          # Legacy Anthropic fallback (Ollama 429 olursa)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Apify (X/Twitter scraper — apidojo/twitter-scraper-lite)
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ENVIRONMENT: production
        run: python pipeline.py --no-telegram
      - name: Kahve radar rollup
        # Watchlist eşleşmelerini docs/data/kahve.json'a yazar.
        # Rollup hatası pipeline'ı düşürmesin diye continue-on-error.
        continue-on-error: true
        working-directory: hashtrend-analytics
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python rollup_food.py
      - name: Kahve rollup commit
        # docs/data/kahve.json değiştiyse commit + push.
        continue-on-error: true
        run: |
          git config user.name "hashtrend-bot"
          git config user.email "hashtrend-bot@users.noreply.github.com"
          git add docs/data/kahve.json
          # Pipeline sürerken branch'e push gelirse düz push reddedilir →
          # önce rebase'li tekrar dene (yalnız kahve.json commit'i replay edilir).
          git diff --staged --quiet || (git commit -m "chore(data): kahve radar rollup [skip ci]" && (git push || (git pull --rebase && git push)))
      # NOT: Mat view refresh PostgREST üzerinden 60s statement_timeout'a
      # takılıyordu (kod 57014). Refresh artık Supabase tarafında pg_cron
      # ile DB-side schedule edilmiş durumda (her 2 saatte bir, *:15 UTC).
      # Workflow refresh adımı kaldırıldı; pipeline yalnızca collector +
      # DB write yapar, refresh background job hallediyor.
